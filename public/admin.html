<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión | JADI SALUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css"> <style>
        :root { --accent: #00f2ff; --bg: #0a0a0c; --card: #141418; }
        
        .dashboard-container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .header-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* Tarjetas de Resumen */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-left: 5px solid var(--accent);
            border-radius: 5px;
        }

        /* Tabla de Pacientes */
        .table-container {
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
        }

        th {
            text-align: left;
            color: var(--accent);
            padding: 15px;
            border-bottom: 1px solid #333;
            font-family: 'Orbitron';
            font-size: 0.8rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #222;
            font-size: 0.9rem;
        }

        .btn-action {
            padding: 5px 10px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            border-radius: 3px;
            font-family: 'Orbitron';
            font-size: 0.7rem;
        }

        .btn-action:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="header-admin">
            <div>
                <h1 id="nombreCentro" class="accent">PANEL DE CONTROL</h1>
                <p id="subtitulo" style="font-size: 0.8rem; color: #666;">Cargando datos del establecimiento...</p>
            </div>
            <button class="btn-action" onclick="logout()">CERRAR SESIÓN</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <small>PACIENTES TOTALES</small>
                <h2 id="totalPacientes">0</h2>
            </div>
            <div class="stat-card" style="border-color: #ff00ff;">
                <small>ESTADO DEL SISTEMA</small>
                <h2 style="color: #ff00ff;">EN LÍNEA</h2>
            </div>
        </div>

        <section class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-family: 'Orbitron'; font-size: 1.2rem;">ÚLTIMOS REGISTROS</h2>
                <input type="text" id="buscador" placeholder="Buscar por cédula..." style="background: #000; color: #fff; border: 1px solid #333; padding: 8px;">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID HISTORIA</th>
                        <th>PACIENTE</th>
                        <th>CÉDULA</th>
                        <th>TELÉFONO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="listaPacientes">
                    </tbody>
            </table>
        </section>
    </div>

    <script type="module">
        import { JADI_GENERATOR } from '../js/generator.js';
        
        // Lógica para detectar qué centro médico es
        const params = new URLSearchParams(window.location.search);
        const centroId = params.get('id') || 'GENERAL';
        
        document.getElementById('nombreCentro').innerText = centroId.replace(/-/g, ' ').toUpperCase();
        document.getElementById('subtitulo').innerText = `GESTIÓN EXCLUSIVA: ${centroId}`;

        // Función temporal para simular cerrar sesión
        window.logout = () => {
            window.location.href = "../login.html";
        };
    </script>
    
    <script type="module" src="../js/core.js"></script>
</body>
</html>
