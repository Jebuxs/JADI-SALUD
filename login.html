<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JADI SALUD | Autenticación</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background: #0a0a0c; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Roboto'; }
        .login-card { background: #141418; padding: 40px; border-radius: 15px; width: 350px; border: 1px solid #222; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; cursor: pointer; border-radius: 5px; border: none; font-family: 'Orbitron'; font-weight: bold; }
        .btn-login { background: #00f2ff; color: #000; }
        .btn-google { background: white; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="view-login">
        <h2>INICIAR SESIÓN</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-login" onclick="Auth.login(email.value, pass.value)">ENTRAR</button>
        <button class="btn-google" onclick="Auth.google()">Entrar con Google</button>
        <p>¿No tienes cuenta? <a href="#" onclick="Auth.showRegister()">Regístrate aquí</a></p>
    </div>

    <div id="view-register" style="display:none;">
        <h2>REGISTRAR CENTRO</h2>
        <input type="text" id="regName" placeholder="Nombre del Centro">
        <input type="email" id="regEmail" placeholder="Correo">
        <input type="password" id="regPass" placeholder="Contraseña">
        <button class="btn-login" onclick="Auth.register(regName.value, regEmail.value, regPass.value)">CREAR CUENTA</button>
        <p><a href="#" onclick="Auth.showLogin()">Volver al Login</a></p>
    </div>
</div>

<script type="module">
    import { Auth } from './js/auth.js';
    window.Auth = Auth; // Exponemos para los botones HTML
</script>
</body>
</html>
