<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADI SALUD | Business Suite</title>
    <link rel="manifest" href="/JADI-SALUD/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/JADI-SALUD/css/styles.css">
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0c; --card: #141418; }
        body { background-color: var(--bg); margin: 0; font-family: 'Roboto', sans-serif; color: #fff; }

        .hero {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&q=80&w=2053');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--accent);
            text-align: center;
            padding: 20px;
        }

        .hero h1 { font-size: clamp(2rem, 8vw, 4rem); margin: 0; text-shadow: 0 0 20px var(--accent); font-family: 'Orbitron'; }
        
        .btn-join {
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--accent);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .ads-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .ad-card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #222; }
        .ad-card h3 { color: var(--accent); font-family: 'Orbitron'; font-size: 1rem; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 id="nombreNegocio">JADI SALUD</h1>
        <p id="tagline" style="letter-spacing: 3px;">TECH MÉDICA DE ÉLITE</p>
        <a href="login.html" class="btn-join">¡ÚNETE AHORA!</a>
    </section>

    <main class="ads-grid">
        <div class="ad-card"><h3>📊 DASHBOARD REAL-TIME</h3><p>Controla tus ingresos y pacientes en vivo.</p></div>
        <div class="ad-card"><h3>🔐 FIREBASE SECURITY</h3><p>Expedientes protegidos con cifrado militar.</p></div>
        <div class="ad-card"><h3>📱 ACCESO MÓVIL</h3><p>Gestiona tu clínica desde el celular.</p></div>
    </main>

    <div id="installBanner" style="display:none; position: fixed; bottom: 20px; left: 5%; right: 5%; background: #0a0a0c; border: 2px solid var(--accent); color: var(--accent); padding: 15px; border-radius: 10px; text-align: center; font-family: 'Orbitron'; z-index: 9999; box-shadow: 0 0 20px rgba(0,242,255,0.4);">
        INSTALAR JADI SALUD
    </div>

    <script type="module" src="/JADI-SALUD/js/core.js"></script>

</body>
</html>
