<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración JADI SALUD</title>
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .card { background: #141418; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; border-radius: 5px; border: none; margin-top: 10px; font-weight: bold; }
        #btnAgregar { background: #333; color: white; }
        #btnFinalizar { background: #00f2ff; color: #000; margin-top: 20px; }
        ul { list-style: none; padding: 0; }
        li { background: #1a1a20; padding: 8px; margin: 5px 0; border-left: 3px solid #00f2ff; }
    </style>
</head>
<body>

<div class="card">
    <h2>Configura tu Centro</h2>
    <input type="text" id="nombreEstablecimiento" placeholder="Nombre del Establecimiento">
    <input type="text" id="servicioInput" placeholder="Servicio médico">
    <button id="btnAgregar">AGREGAR SERVICIO</button>
    <ul id="listaServicios"></ul>
    <button id="btnFinalizar">FINALIZAR CONFIGURACIÓN</button>
</div>

<script type="module" src="js/setup.js"></script>
</body>
</html>
