<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #0a0a0c; --card-bg: #141418; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .setup-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--neon-blue); margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.85rem; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 8px rgba(0, 242, 255, 0.2); }
        .btn-container { display: flex; gap: 10px; margin-top: 10px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #btnAgregar { background: #222; color: white; border: 1px solid #444; }
        #btnFinalizar { background: var(--neon-blue); color: black; width: 100%; margin-top: 20px; }
        button:hover { filter: brightness(1.2); }
        #listaServicios { list-style: none; padding: 0; margin: 20px 0; }
        #listaServicios li { background: #1a1a20; padding: 10px; border-radius: 6px; margin-bottom: 5px; border-left: 3px solid var(--neon-blue); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="setup-card">
    <h2>Configuración Inicial</h2>
    <p style="color:#666; font-size: 0.9rem;">Personaliza tu entorno de trabajo JADI SALUD.</p>
    
    <div class="input-group">
        <label>Nombre del Establecimiento</label>
        <input type="text" id="nombreEstablecimiento" placeholder="Ej: Clínica San José">
    </div>

    <div class="input-group">
        <label>Servicios Médicos</label>
        <div style="display:flex; gap:5px;">
            <input type="text" id="servicioInput" placeholder="Ej: Medicina General">
            <button id="btnAgregar">✚</button>
        </div>
    </div>

    <ul id="listaServicios"></ul>

    <button id="btnFinalizar">FINALIZAR CONFIGURACIÓN</button>
</div>

<script type="module" src="js/setup.js"></script>
</body>
</html>
