<div class="card">
    <h2>Configura tu Centro Médico</h2>
    <p>Completa la información básica para comenzar.</p>
    
    <label>Nombre del Establecimiento</label>
    <input type="text" id="nombreEstablecimiento" placeholder="Ej: Clínica San José">

    <label>Tus Servicios</label>
    <input type="text" id="servicioInput" placeholder="Ej: Medicina General">
    <button class="btn-add" id="btnAgregar">Agregar Servicio</button>

    <ul id="listaServicios"></ul>

    <button class="btn-save" id="btnFinalizar">FINALIZAR CONFIGURACIÓN</button>
</div>

<script type="module" src="js/setup.js"></script>
